! containerlab/configs/rtr-01-initial.cfg
!
! RTR-01 — Cisco c8000v IOS-XE
! Role    : WAN Core Router — Site 1
! AS      : 65001
! eBGP    : peer rtr-02 (10.0.0.2) AS 65002
! OSPF    : area 0 toward arista-01
! NAT     : overload on GigabitEthernet2 (eBGP outside)
!
! Management access: 172.20.20.11
! Default credentials: admin / admin
!
hostname rtr-01
!
! ── AAA and access ─────────────────────────────────────────────────────────
aaa new-model
aaa authentication login default local
aaa authorization exec default local
!
username admin privilege 15 secret admin
!
ip domain-name lab.local
crypto key generate rsa modulus 2048
!
line vty 0 4
 transport input ssh
 login local
!
! ── Loopback (Router-ID) ───────────────────────────────────────────────────
interface Loopback0
 description ROUTER-ID
 ip address 1.1.1.1 255.255.255.255
 no shutdown
!
! ── GigabitEthernet2 — eBGP link to rtr-02 (NAT outside) ─────────────────
interface GigabitEthernet2
 description eBGP-TO-RTR02
 ip address 10.0.0.1 255.255.255.252
 ip nat outside
 no shutdown
!
! ── GigabitEthernet3 — OSPF link to arista-01 (NAT inside) ───────────────
interface GigabitEthernet3
 description OSPF-TO-ARISTA01
 ip address 10.1.1.1 255.255.255.252
 ip nat inside
 ip ospf 1 area 0
 no shutdown
!
! ── OSPF ───────────────────────────────────────────────────────────────────
router ospf 1
 router-id 1.1.1.1
 log-adjacency-changes
 network 10.1.1.0 0.0.0.3 area 0
 network 1.1.1.1 0.0.0.0 area 0
 default-information originate always
!
! ── BGP ────────────────────────────────────────────────────────────────────
router bgp 65001
 bgp router-id 1.1.1.1
 bgp log-neighbor-changes
 !
 ! -- eBGP peer: rtr-02
 neighbor 10.0.0.2 remote-as 65002
 neighbor 10.0.0.2 description eBGP-RTR02
 neighbor 10.0.0.2 update-source GigabitEthernet2
 !
 address-family ipv4
  neighbor 10.0.0.2 activate
  network 10.1.1.0 mask 255.255.255.252
  network 192.168.1.0 mask 255.255.255.0
  redistribute ospf 1
 exit-address-family
!
! ── NAT overload ───────────────────────────────────────────────────────────
!  Hosts behind arista-01 (192.168.1.0/24) use NAT when
!  traffic exits toward rtr-02 via GigabitEthernet2
!
ip access-list standard NAT-INSIDE-HOSTS
 permit 192.168.1.0 0.0.0.255
!
ip nat inside source list NAT-INSIDE-HOSTS interface GigabitEthernet2 overload
!
! ── Static route for host-02 network via BGP ──────────────────────────────
ip route 192.168.2.0 255.255.255.0 10.0.0.2
!
! ── Monitoring: SNMP (for Prometheus SNMP exporter if needed) ─────────────
snmp-server community public RO
snmp-server location lab-dc01
snmp-server contact netauto-lab
!
end