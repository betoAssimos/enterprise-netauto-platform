no aaa root
!
username admin privilege 15 role network-admin secret sha512 $6$uSVgg/YBmukrmMaH$GryPMRTFEs4t0F0NjmdP2bAHToZ7IxwyaobRr8mt0pKHTUxemcTSTVy29jHzUPNe4DUhQw2oZ4izQqYoxJSgl.
!
management api http-commands
   no shutdown
!
no service interface inactive port-id allocation disabled
