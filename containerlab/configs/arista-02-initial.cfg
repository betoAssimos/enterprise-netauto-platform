   description OSPF-TO-RTR02
   no switchport
   ip address 10.2.2.2/30
!
interface Ethernet2
   description LAN-TO-HOST02
   no switchport
   ip address 192.168.2.1/24
   ip access-group POLICY-HOST02-OUT out
