hostname arista-02
!
username admin privilege 15 role network-admin secret admin
!
management api http-commands
   no shutdown
!
interface Loopback0
   description ROUTER-ID
   ip address 10.10.10.2/32
!
interface Ethernet1
   description OSPF-TO-RTR02
   no switchport
   ip address 10.2.2.2/30
   no shutdown
!
interface Ethernet2
   description LAN-TO-HOST02
   no switchport
   ip address 192.168.2.1/24
   no shutdown
!
router ospf 1
   router-id 10.10.10.2
   network 10.2.2.0/30 area 0.0.0.0
   network 192.168.2.0/24 area 0.0.0.0
   network 10.10.10.2/32 area 0.0.0.0
   log-adjacency-changes detail
   max-lsa 12000
!
ip routing
!
ip route 0.0.0.0/0 10.2.2.1
!
ip access-list POLICY-HOST02-OUT
   10 permit ip 192.168.2.0/24 192.168.1.0/24
   20 permit ip any any
!
interface Ethernet2
   ip access-group POLICY-HOST02-OUT out
!
end