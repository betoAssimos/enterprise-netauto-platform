! containerlab/configs/rtr-02-initial.cfg
!
! RTR-02 - Cisco c8000v IOS-XE
! Role  : WAN Core Router - Site 2
! AS    : 65002
! eBGP  : peer rtr-01 (10.0.0.1) AS 65001
! OSPF  : area 0 toward arista-02
! NAT   : overload on GigabitEthernet2 (eBGP outside)
!
hostname rtr-02
!
aaa new-model
aaa authentication login default local
aaa authorization exec default local
!
username admin privilege 15 secret admin
!
ip domain-name lab.local
crypto key generate rsa modulus 2048
!
line vty 0 4
 transport input ssh
 login local
!
interface Loopback0
 description ROUTER-ID
 ip address 2.2.2.2 255.255.255.255
 no shutdown
!
interface GigabitEthernet2
 description eBGP-TO-RTR01
 ip address 10.0.0.2 255.255.255.252
 ip nat outside
 no shutdown
!
interface GigabitEthernet3
 description OSPF-TO-ARISTA02
 ip address 10.2.2.1 255.255.255.252
 ip nat inside
 ip ospf 1 area 0
 no shutdown
!
router ospf 1
 router-id 2.2.2.2
 log-adjacency-changes
 network 10.2.2.0 0.0.0.3 area 0
 network 2.2.2.2 0.0.0.0 area 0
 default-information originate always
!
router bgp 65002
 bgp router-id 2.2.2.2
 bgp log-neighbor-changes
 neighbor 10.0.0.1 remote-as 65001
 neighbor 10.0.0.1 description eBGP-RTR01
 neighbor 10.0.0.1 update-source GigabitEthernet2
 !
 address-family ipv4
  neighbor 10.0.0.1 activate
  network 10.2.2.0 mask 255.255.255.252
  network 192.168.2.0 mask 255.255.255.0
  redistribute ospf 1
 exit-address-family
!
ip access-list standard NAT-INSIDE-HOSTS
 permit 192.168.2.0 0.0.0.255
!
ip nat inside source list NAT-INSIDE-HOSTS interface GigabitEthernet2 overload
!
ip route 192.168.1.0 255.255.255.0 10.0.0.1
!
snmp-server community public RO
snmp-server location lab-dc01
snmp-server contact netauto-lab
!
end