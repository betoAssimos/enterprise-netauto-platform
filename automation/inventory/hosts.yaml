# ── Core Switches (Arista cEOS — MLAG pair) ───────────────────────────────────

core-sw-01:
  hostname: 172.20.20.15
  groups:
    - arista
  data:
    manufacturer: Arista
    model: cEOS
    role: core-switch
    site: lab-dc01
    custom_fields:

      # OSPF — area 0, routed links to both routers + SVI networks
      ospf_process: 1
      ospf_router_id: 3.3.3.3
      ospf_networks:
        - network: 3.3.3.3
          wildcard: 0.0.0.0
          area: 0
        - network: 10.1.0.0
          wildcard: 0.0.0.3
          area: 0
        - network: 10.2.0.0
          wildcard: 0.0.0.3
          area: 0
        - network: 10.10.10.0
          wildcard: 0.0.0.255
          area: 0
        - network: 10.20.20.0
          wildcard: 0.0.0.255
          area: 0
        - network: 10.99.99.0
          wildcard: 0.0.0.255
          area: 0

      # MLAG
      mlag_domain_id: 1
      mlag_role: primary
      mlag_peer_link: Port-Channel1
      mlag_peer_link_members:
        - Ethernet3
        - Ethernet4
      mlag_local_ip: 169.254.0.0
      mlag_peer_ip: 169.254.0.1
      mlag_peer_mgmt_ip: 172.20.20.16

      # VLANs
      vlans:
        - id: 10
          name: users
        - id: 20
          name: servers
        - id: 99
          name: management
        - id: 4094
          name: mlag-peer
          trunk_group: MLAGPEER

      # L3 routed interfaces (toward routers)
      routed_interfaces:
        - name: Loopback0
          description: Router-ID / OSPF source
          ip_address: 3.3.3.3/32
          ospf_area: 0
        - name: Ethernet1
          description: L3 to rtr-01 Gi3
          ip_address: 10.1.0.2/30
          ospf_area: 0
          ospf_network_type: point-to-point
        - name: Ethernet2
          description: L3 to rtr-02 Gi3
          ip_address: 10.2.0.2/30
          ospf_area: 0
          ospf_network_type: point-to-point

      # SVIs (VLAN L3 gateways)
      svis:
        - vlan: 10
          ip_address: 10.10.10.2/24
          description: VLAN 10 users gateway
          ospf_area: 0
        - vlan: 20
          ip_address: 10.20.20.2/24
          description: VLAN 20 servers gateway
          ospf_area: 0
        - vlan: 99
          ip_address: 10.99.99.2/24
          description: VLAN 99 management gateway
          ospf_area: 0

      # VRRP (primary — higher priority wins)
      vrrp_groups:
        - vlan: 10
          group: 10
          priority: 110
          virtual_ip: 10.10.10.1
        - vlan: 20
          group: 20
          priority: 110
          virtual_ip: 10.20.20.1
        - vlan: 99
          group: 99
          priority: 110
          virtual_ip: 10.99.99.1

      # MLAG port-channels toward access switches
      mlag_portchannels:
        - mlag_id: 10
          port_channel_id: 10
          description: MLAG to arista-01
          members:
            - Ethernet5
          trunk_vlans: "10,20,99"
        - mlag_id: 20
          port_channel_id: 20
          description: MLAG to arista-02
          members:
            - Ethernet6
          trunk_vlans: "10,20,99"

      # Services host port (svc-01, VLAN 20 access)
      access_ports:
        - interface: Ethernet7
          vlan: 20
          description: svc-01

      # SNMP
      snmp:
        community: netauto
        version: 2c
        trap_source: Loopback0

      syslog:
        server: 10.20.20.100
        trap: informational
        source_interface: Loopback0

      # NTP
      ntp:
        server: 10.20.20.100
        key_id: 1
        key_type: md5

