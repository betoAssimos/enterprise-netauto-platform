# automation/inventory/hosts.yaml
#
# Nornir static inventory — Enterprise Network Automation Platform
#
# This file is the single source of truth for all per-device automation data.
# custom_fields drive all workflow context builders.
#
# Device roles:
#   edge-router  : rtr-01, rtr-02  (Cisco c8000v, IOS XE)
#   core-switch  : core-sw-01, core-sw-02  (Arista cEOS, MLAG pair)
#   access-switch: arista-01, arista-02  (Arista cEOS, L2 only)
#
# Management network: 172.20.20.0/24

# ── Edge Routers (Cisco c8000v IOS XE) ────────────────────────────────────────

rtr-01:
  hostname: 172.20.20.11
  groups:
    - cisco
  data:
    manufacturer: Cisco
    model: c8000v
    role: edge-router
    site: lab-dc01
    custom_fields:

      # BGP — eBGP to rtr-02 only
      bgp_asn: 65001
      bgp_router_id: 1.1.1.1
      bgp_redistribute_connected: false
      bgp_redistribute_ospf: false
      bgp_neighbors:
        - description: eBGP to rtr-02
          ip: 10.0.0.2
          remote_as: 65002
          next_hop_self: true
          route_map_out: EBGP-OUT
      bgp_networks:
        - prefix: 1.1.1.1
          mask: 255.255.255.255
      bgp_prefix_lists:
        - name: PERMIT-LOOPBACK
          entries:
            - seq: 10
              action: permit
              prefix: 1.1.1.1/32

      bgp_route_maps:
        - name: EBGP-OUT
          entries:
            - seq: 10
              action: permit
              match_prefix_list: PERMIT-LOOPBACK

      # OSPF — area 0, toward both core switches and loopback
      ospf_process: 1
      ospf_router_id: 1.1.1.1
      ospf_networks:
        - network: 1.1.1.1
          wildcard: 0.0.0.0
          area: 0
        - network: 10.1.0.0
          wildcard: 0.0.0.3
          area: 0
        - network: 10.1.0.4
          wildcard: 0.0.0.3
          area: 0

      # NAT — inside: Gi3+Gi4 (core links), outside: Gi5 (inet-host)
      nat_inside_interfaces:
        - GigabitEthernet3
        - GigabitEthernet4
      nat_outside_interface: GigabitEthernet5
      nat_acl_entries:
        - seq: 10
          action: permit
          src: 10.10.10.0
          src_wildcard: 0.0.0.255
          dst: any
        - seq: 20
          action: permit
          src: 10.20.20.0
          src_wildcard: 0.0.0.255
          dst: any
        - seq: 30
          action: permit
          src: 10.99.99.0
          src_wildcard: 0.0.0.255
          dst: any
      # Interfaces
      interfaces:
        - name: Loopback0
          ip_address: 1.1.1.1/32
          description: Router-ID / BGP update-source

        - name: GigabitEthernet2
          ip_address: 10.0.0.1/30
          description: eBGP peering link to rtr-02
          ospf_area: "0"
          ospf_process: "1"

        - name: GigabitEthernet3
          ip_address: 10.1.0.1/30
          description: L3 OSPF link to core-sw-01
          nat_role: inside
          ospf_area: "0"
          ospf_process: "1"
          ospf_network: point-to-point

        - name: GigabitEthernet4
          ip_address: 10.1.0.5/30
          description: L3 OSPF link to core-sw-02
          nat_role: inside
          ospf_area: "0"
          ospf_process: "1"
          ospf_network: point-to-point


        - name: GigabitEthernet5
          ip_address: 203.0.113.2/30
          description: Internet simulation link to inet-host
          nat_role: outside

      # SNMP
      snmp:
        community: netauto
        version: 2c
        trap_source: Loopback0

      syslog:
        server: 10.20.20.100
        trap: informational
        source_interface: Loopback0

      ssh:
        version: 2
        vty_lines: "0 4"
        transport_input: ssh

      # NTP
      ntp:
        server: 10.20.20.100
        key_id: 1
        key_type: md5

