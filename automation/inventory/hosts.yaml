# ── Access Switches (Arista cEOS — L2 only) ───────────────────────────────────

arista-01:
  hostname: 172.20.20.13
  groups:
    - arista
  data:
    manufacturer: Arista
    model: cEOS
    role: access-switch
    site: lab-dc01
    custom_fields:

      # VLANs
      vlans:
        - id: 10
          name: users
        - id: 20
          name: servers
        - id: 99
          name: management

      # LACP uplink port-channel to core (MLAG)
      uplink_portchannel:
        id: 1
        description: LACP uplink to core MLAG
        mode: active
        trunk_vlans: "10,20,99"
        members:
          - Ethernet1
          - Ethernet2

      # Access ports toward end hosts
      access_ports:
        - interface: Ethernet3
          vlan: 10
          description: host-01
        - interface: Ethernet4
          vlan: 10
          description: host-03

      # SNMP
      snmp:
        community: netauto
        version: 2c
        trap_source: Loopback0

      # NTP
      ntp:
        server: 172.20.20.1

