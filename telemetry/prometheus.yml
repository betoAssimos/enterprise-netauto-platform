global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'snmp'
    static_configs:
      - targets:
          - 172.20.20.11  # rtr-01
          - 172.20.20.12  # rtr-02
          - 172.20.20.13  # arista-01
          - 172.20.20.14  # arista-02
    metrics_path: /snmp
    params:
      module: [system]
      auth: [public_v2]
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: snmp-exporter:9116
  - job_name: 'gnmic'
    static_configs:
      - targets: ['172.17.0.1:9804']
