auths:
  public_v2:
    community: public
    version: 2

modules:
  system:
    walk:
      - 1.3.6.1.2.1.1       # system
      - 1.3.6.1.2.1.2.2     # interfaces
      - 1.3.6.1.2.1.15.3    # bgpPeerTable
      - 1.3.6.1.2.1.14.10   # ospfNbrTable

    metrics:

      # ── System ──────────────────────────────────────────────────────────────
      - name: sysUpTime
        oid: 1.3.6.1.2.1.1.3
        type: gauge
        help: System uptime in hundredths of a second

      - name: sysName
        oid: 1.3.6.1.2.1.1.5
        type: DisplayString
        help: System name

      - name: sysDescr
        oid: 1.3.6.1.2.1.1.1
        type: DisplayString
        help: System description

      # ── Interfaces ──────────────────────────────────────────────────────────
      - name: ifOperStatus
        oid: 1.3.6.1.2.1.2.2.1.8
        type: gauge
        help: Interface operational status (1=up, 2=down)
        indexes:
          - labelname: ifIndex
            type: gauge
        lookups:
          - labels: [ifIndex]
            labelname: ifDescr
            oid: 1.3.6.1.2.1.2.2.1.2
            type: DisplayString

      - name: ifInOctets
        oid: 1.3.6.1.2.1.2.2.1.10
        type: counter
        help: Bytes received on interface
        indexes:
          - labelname: ifIndex
            type: gauge
        lookups:
          - labels: [ifIndex]
            labelname: ifDescr
            oid: 1.3.6.1.2.1.2.2.1.2
            type: DisplayString

      - name: ifOutOctets
        oid: 1.3.6.1.2.1.2.2.1.16
        type: counter
        help: Bytes sent on interface
        indexes:
          - labelname: ifIndex
            type: gauge
        lookups:
          - labels: [ifIndex]
            labelname: ifDescr
            oid: 1.3.6.1.2.1.2.2.1.2
            type: DisplayString

      - name: ifInErrors
        oid: 1.3.6.1.2.1.2.2.1.14
        type: counter
        help: Inbound errors on interface
        indexes:
          - labelname: ifIndex
            type: gauge
        lookups:
          - labels: [ifIndex]
            labelname: ifDescr
            oid: 1.3.6.1.2.1.2.2.1.2
            type: DisplayString

      - name: ifOutErrors
        oid: 1.3.6.1.2.1.2.2.1.20
        type: counter
        help: Outbound errors on interface
        indexes:
          - labelname: ifIndex
            type: gauge
        lookups:
          - labels: [ifIndex]
            labelname: ifDescr
            oid: 1.3.6.1.2.1.2.2.1.2
            type: DisplayString

      - name: ifInDiscards
        oid: 1.3.6.1.2.1.2.2.1.13
        type: counter
        help: Inbound discards on interface
        indexes:
          - labelname: ifIndex
            type: gauge
        lookups:
          - labels: [ifIndex]
            labelname: ifDescr
            oid: 1.3.6.1.2.1.2.2.1.2
            type: DisplayString

      - name: ifSpeed
        oid: 1.3.6.1.2.1.2.2.1.5
        type: gauge
        help: Interface speed in bits per second
        indexes:
          - labelname: ifIndex
            type: gauge
        lookups:
          - labels: [ifIndex]
            labelname: ifDescr
            oid: 1.3.6.1.2.1.2.2.1.2
            type: DisplayString

      # ── BGP ─────────────────────────────────────────────────────────────────
      # bgpPeerState: 1=idle,2=connect,3=active,4=opensent,5=openconfirm,6=established
      - name: bgpPeerState
        oid: 1.3.6.1.2.1.15.3.1.2
        type: gauge
        help: BGP peer state (6=established)
        indexes:
          - labelname: bgpPeerRemoteAddr
            type: InetAddressIPv4

      - name: bgpPeerAdminStatus
        oid: 1.3.6.1.2.1.15.3.1.3
        type: gauge
        help: BGP peer admin status (1=stop, 2=start)
        indexes:
          - labelname: bgpPeerRemoteAddr
            type: InetAddressIPv4

      - name: bgpPeerInUpdates
        oid: 1.3.6.1.2.1.15.3.1.10
        type: counter
        help: BGP updates received from peer
        indexes:
          - labelname: bgpPeerRemoteAddr
            type: InetAddressIPv4

      - name: bgpPeerOutUpdates
        oid: 1.3.6.1.2.1.15.3.1.11
        type: counter
        help: BGP updates sent to peer
        indexes:
          - labelname: bgpPeerRemoteAddr
            type: InetAddressIPv4

      # ── OSPF ─────────────────────────────────────────────────────────────────
      # ospfNbrState: 1=down,2=attempt,3=init,4=twoWay,5=exchangeStart,6=exchange,7=loading,8=full
      - name: ospfNbrState
        oid: 1.3.6.1.2.1.14.10.1.6
        type: gauge
        help: OSPF neighbor state (8=full)
        indexes:
          - labelname: ospfNbrIpAddr
            type: InetAddressIPv4
          - labelname: ospfNbrAddressLessIndex
            type: gauge