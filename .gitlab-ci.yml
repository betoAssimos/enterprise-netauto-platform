# ============================================================================
# .gitlab-ci.yml — Enterprise Network Automation Platform
# ============================================================================
#
# Pipeline stages implement the full network change lifecycle:
#
#   build          → validate environment, deps, device reachability, inventory
#   prevalidation  → pyATS baseline capture (what the network looks like NOW)
#   deploy         → push all config via Nornir/Scrapli (manual gate)
#   postvalidation → pyATS regression check + end-to-end connectivity
#   remediation    → targeted switching restore (manual gate, on fault)
#
# Runner: wsl-lab-runner (shell executor, tags: wsl, lab)
# The runner has direct L3 access to the Containerlab network (172.20.20.0/24)
# and the project venv is pre-installed at $PROJECT_DIR/venv.
#
# Secrets injected via GitLab CI/CD variables (Settings → CI/CD → Variables):
#   NETBOX_URL       http://localhost:8000
#   NETBOX_TOKEN     nbt_<key>.<secret>
#   DEVICE_USERNAME  admin
#   DEVICE_PASSWORD  admin
# ============================================================================

variables:
  VENV_PYTHON: "/home/beto/enterprise-netauto-platform/venv/bin/python"
  VENV_PYATS:  "/home/beto/enterprise-netauto-platform/venv/bin/pyats"

default:
  tags:
    - wsl
    - lab
  before_script:
    - source /home/beto/enterprise-netauto-platform/venv/bin/activate
    - set -a && source /home/beto/enterprise-netauto-platform/.env && set +a

stages:
  - build
  - prevalidation
  - deploy
  - postvalidation
  - remediation

# ============================================================================
# STAGE 1 -- BUILD
# ============================================================================

build:validate-environment:
  stage: build
  script:
    - echo "==> Validating Python environment"
    - $VENV_PYTHON --version
    - $VENV_PYTHON -c "import nornir, pynetbox, scrapli, pyats; print('All core deps present')"
    - echo "==> Validating NetBox API connectivity"
    - $VENV_PYTHON automation/runner.py validate netbox
    - echo "==> Validating Containerlab devices reachable"
    - ping -c1 -W2 172.20.20.11 > /dev/null && echo "rtr-01 reachable"
    - ping -c1 -W2 172.20.20.12 > /dev/null && echo "rtr-02 reachable"
    - ping -c1 -W2 172.20.20.13 > /dev/null && echo "arista-01 reachable"
    - ping -c1 -W2 172.20.20.14 > /dev/null && echo "arista-02 reachable"
    - ping -c1 -W2 172.20.20.15 > /dev/null && echo "core-sw-01 reachable"
    - ping -c1 -W2 172.20.20.16 > /dev/null && echo "core-sw-02 reachable"

build:validate-inventory:
  stage: build
  needs: [build:validate-environment]
  script:
    - echo "==> Validating static inventory"
    - $VENV_PYTHON automation/runner.py validate inventory
    - echo "==> Verifying SSH connectivity to all managed devices"
    - $VENV_PYTHON automation/runner.py connect test

# ============================================================================
# STAGE 2 -- PREVALIDATION
# allow_failure: true handles first-deploy scenario where BGP does not
# exist yet — pipeline continues to deploy rather than aborting.
# ============================================================================

prevalidation:bgp-baseline:
  stage: prevalidation
  needs: [build:validate-inventory]
  script:
    - echo "==> Running pyATS BGP pre-check"
    - $VENV_PYATS run job tests/precheck/test_bgp.py --testbed tests/testbed.yaml 2>&1 | tee precheck.log
    - grep -E "Result\s*:\s*(PASSED|FAILED|ERRORED)" precheck.log && echo "Pre-check result captured"
  artifacts:
    paths:
      - precheck.log
    expire_in: 7 days
    when: always
  allow_failure: true

# ============================================================================
# STAGE 3 -- DEPLOY
# Manual gate — requires clicking play in GitLab UI before execution.
# All workflows are idempotent — safe to re-run.
# ============================================================================

deploy:full-stack:
  stage: deploy
  needs: [prevalidation:bgp-baseline]
  when: manual
  script:
    - echo "==> Deploying full configuration stack"
    - $VENV_PYTHON automation/runner.py deploy interfaces
    - $VENV_PYTHON automation/runner.py deploy ospf
    - $VENV_PYTHON automation/runner.py deploy nat
    - $VENV_PYTHON automation/runner.py deploy bgp
    - $VENV_PYTHON automation/runner.py deploy bgp-policy
    - $VENV_PYTHON automation/runner.py deploy vlans
    - $VENV_PYTHON automation/runner.py deploy portchannels
    - $VENV_PYTHON automation/runner.py deploy mlag
    - $VENV_PYTHON automation/runner.py deploy vrrp
    - $VENV_PYTHON automation/runner.py deploy ntp
    - $VENV_PYTHON automation/runner.py deploy syslog
    - $VENV_PYTHON automation/runner.py deploy snmp
    - $VENV_PYTHON automation/runner.py deploy ssh
    - echo "==> Full stack deployment complete"

# ============================================================================
# STAGE 4 -- POSTVALIDATION
# Hard gate — pipeline fails if any check does not pass.
# ============================================================================

postvalidation:bgp-verify:
  stage: postvalidation
  needs: [deploy:full-stack]
  script:
    - echo "==> Running pyATS BGP post-check"
    - $VENV_PYATS run job tests/postcheck/test_bgp.py --testbed tests/testbed.yaml 2>&1 | tee postcheck.log
    - grep -E "Result\s*:\s*PASSED" postcheck.log || (echo "POST-CHECK FAILED — BGP regression detected" && exit 1)
  artifacts:
    paths:
      - postcheck.log
    expire_in: 30 days
    when: always

postvalidation:bgp-intent:
  stage: postvalidation
  needs: [deploy:full-stack]
  script:
    - echo "==> Running BGP intent validation"
    - $VENV_PYATS run job tests/postcheck/test_bgp_intent.py --testbed tests/testbed.yaml 2>&1 | tee bgp_intent.log
    - grep -E "Result\s*:\s*PASSED" bgp_intent.log || (echo "INTENT CHECK FAILED — advertised prefixes do not match policy intent" && exit 1)
  artifacts:
    paths:
      - bgp_intent.log
    expire_in: 30 days
    when: always

postvalidation:connectivity:
  stage: postvalidation
  needs: [deploy:full-stack]
  script:
    - echo "==> Running pyATS connectivity validation"
    - $VENV_PYATS run job tests/postcheck/test_connectivity.py --testbed tests/testbed.yaml 2>&1 | tee connectivity.log
    - grep -E "Result\s*:\s*PASSED" connectivity.log || (echo "CONNECTIVITY CHECK FAILED — data plane unreachable" && exit 1)
  artifacts:
    paths:
      - connectivity.log
    expire_in: 30 days
    when: always

# ============================================================================
# STAGE 5 -- REMEDIATION
# Manual gate — triggered after a postvalidation failure or fault event.
# Redeploys the switching domain and re-validates connectivity.
# Idempotent — safe to trigger multiple times.
# ============================================================================

remediation:switching-restore:
  stage: remediation
  when: manual
  script:
    - echo "==> Remediation triggered — restoring switching domain"
    - echo "--- VLANs ---"
    - $VENV_PYTHON automation/runner.py deploy vlans
    - echo "--- Port-channels ---"
    - $VENV_PYTHON automation/runner.py deploy portchannels
    - echo "--- MLAG ---"
    - $VENV_PYTHON automation/runner.py deploy mlag
    - echo "--- VRRP ---"
    - $VENV_PYTHON automation/runner.py deploy vrrp
    - echo "==> Switching domain restored — running connectivity verification"
    - $VENV_PYATS run job tests/postcheck/test_connectivity.py --testbed tests/testbed.yaml 2>&1 | tee remediation_connectivity.log
    - grep -E "Result\s*:\s*PASSED" remediation_connectivity.log || (echo "REMEDIATION FAILED — connectivity still broken after switching restore" && exit 1)
    - echo "==> Remediation complete — connectivity verified"
  artifacts:
    paths:
      - remediation_connectivity.log
    expire_in: 30 days
    when: always