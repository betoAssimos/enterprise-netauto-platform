---
# ansible/playbooks/syslog_server.yml
#
# Start syslog receiver (socat) on svc-01.
#
# Prerequisites:
#   - svc-01 container must be running
#
# Usage:
#   cd ansible && ansible-playbook playbooks/syslog_server.yml
- name: Configure syslog receiver on svc-01
  hosts: services
  gather_facts: false
  roles:
    - syslog_server